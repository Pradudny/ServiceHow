<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal-container">
    <div class="modal-header">
      <h2>{{ isEditMode ? 'Edit Incident' : 'Create New Incident' }}</h2>
      <button class="close-btn" (click)="onCancel()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label for="title">Title <span class="required">*</span></label>
        <input id="title" type="text" [(ngModel)]="form.title" placeholder="Enter incident title">
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" [(ngModel)]="form.description" rows="4"
                  placeholder="Describe the incident"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="slaDate">SLA Date <span class="required">*</span></label>
          <input id="slaDate" type="date" [(ngModel)]="form.slaDate">
        </div>
        <div class="form-group">
          <label for="assignedTo">Assigned To <span class="required">*</span></label>
          <input id="assignedTo" type="text" [(ngModel)]="form.assignedTo" placeholder="Enter assignee name">
        </div>
      </div>

      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" [(ngModel)]="form.status">
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          @if (isEditMode) {
            <option value="Resolved">Resolved</option>
            <option value="Closed">Closed</option>
          }
        </select>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button class="btn-save" (click)="onSave()"
              [disabled]="!form.title.trim() || !form.slaDate || !form.assignedTo.trim()">
        {{ isEditMode ? 'Update' : 'Save' }}
      </button>
    </div>
  </div>
</div>
