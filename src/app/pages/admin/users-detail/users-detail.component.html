<div class="page-container">
  <div class="page-header">
    <button class="btn-back" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Back to Admin
    </button>
    <div class="title-row">
      <h1>Users</h1>
      <button class="btn-add" (click)="openAddUser()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add User
      </button>
    </div>
  </div>

  <div class="table-container">
    <table class="users-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Department</th>
          <th>Role</th>
          <th class="actions-col">Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (user of users; track user.userId) {
          <tr>
            <td class="name-cell">{{ user.userFname }} {{ user.userLname }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.department }}</td>
            <td><span class="role-tag">{{ user.urole }}</span></td>
            <td class="actions-cell">
              <button class="btn-icon" title="Edit" (click)="openEditUser(user)">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="btn-icon btn-icon-danger" title="Delete" (click)="deleteUser($event, user)">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5" class="empty-state">No users found</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

<!-- User Add/Edit Modal -->
@if (showModal) {
  <div class="modal-overlay" (click)="onOverlayClick($event)">
    <div class="modal-container">
      <div class="modal-header">
        <h3>{{ editingUser ? 'Edit User' : 'Add User' }}</h3>
        <button class="close-btn" (click)="closeModal()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label for="userFname">First Name <span class="required">*</span></label>
            <input id="userFname" type="text" [(ngModel)]="userForm.userFname" placeholder="Enter first name">
          </div>
          <div class="form-group">
            <label for="userLname">Last Name</label>
            <input id="userLname" type="text" [(ngModel)]="userForm.userLname" placeholder="Enter last name">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="userEmail">Email <span class="required">*</span></label>
            <input id="userEmail" type="email" [(ngModel)]="userForm.email" placeholder="Enter email address">
          </div>
          <div class="form-group">
            <label for="userPhone">Phone Number</label>
            <input id="userPhone" type="number" [(ngModel)]="userForm.phoneNumber" placeholder="Enter phone number">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="userDept">Department</label>
            <input id="userDept" type="text" [(ngModel)]="userForm.department" placeholder="Enter department">
          </div>
          <div class="form-group">
            <label for="userRole">Role</label>
            <input id="userRole" type="text" [(ngModel)]="userForm.urole" placeholder="Enter role">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="userBirth">Birth Date</label>
            <input id="userBirth" type="date" [(ngModel)]="userForm.birthDate">
          </div>
          <div class="form-group">
            <label for="userCreatedBy">Created By</label>
            <input id="userCreatedBy" type="text" [(ngModel)]="userForm.createdBy" placeholder="Enter creator name">
          </div>
        </div>
        <div class="form-group">
          <label for="userAddress">Address</label>
          <input id="userAddress" type="text" [(ngModel)]="userForm.address" placeholder="Enter address">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" (click)="closeModal()">Cancel</button>
        <button class="btn-save" (click)="saveUser()"
                [disabled]="!userForm.userFname.trim() || !userForm.email.trim()">
          {{ editingUser ? 'Update' : 'Save' }}
        </button>
      </div>
    </div>
  </div>
}
