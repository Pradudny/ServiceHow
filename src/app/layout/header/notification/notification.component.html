<div class="notification-container">
  <button class="notification-bell" (click)="toggleDropdown()">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    @if (getUnreadCount() > 0) {
      <span class="unread-badge">{{ getUnreadCount() }}</span>
    }
  </button>

  @if (showDropdown) {
    <div class="notification-dropdown">
      <div class="dropdown-header">
        <h4>Notifications</h4>
      </div>
      @if (notifications.length === 0) {
        <div class="no-notifications">No notifications yet</div>
      } @else {
        <div class="notification-list">
          <div *ngFor="let notification of notifications; trackBy: trackById" class="notification-item" [class.unread]="!notification.read" (click)="markAsRead(notification)">
            <div class="notification-icon" [class]="notification.type">
              {{ getNotificationIcon(notification.type) }}
            </div>
            <div class="notification-content">
              <p>{{ notification.message }}</p>
              <small>{{ notification.timestamp }}</small>
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>
